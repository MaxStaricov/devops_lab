name: Build & Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/maxstaricov/devops_lab
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Render Helm manifests
        id: render
        run: |
          helm template todo-app charts/todo-app \
            --namespace ${{ env.ENVIRONMENT }} \
            -f charts/todo-app/values.yaml \
            -f charts/todo-app/values-${{ env.ENVIRONMENT }}.yaml \
            --set image.tag=${{ github.sha }} \
            | base64 -w0 > /tmp/manifest.b64
          echo "manifest=$(cat /tmp/manifest.b64)" >> $GITHUB_OUTPUT

      - name: Deploy to k3s (${{ env.ENVIRONMENT }})
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          password: ${{ secrets.K3S_PASSWORD }}
          script: |
            kubectl create namespace ${{ env.ENVIRONMENT }} \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl create secret docker-registry ghcr-secret \
              --namespace ${{ env.ENVIRONMENT }} \
              --docker-server=${{ env.REGISTRY }} \
              --docker-username=${{ secrets.GHCR_USER }} \
              --docker-password=${{ secrets.GHCR_TOKEN }} \
              --dry-run=client -o yaml | kubectl apply -f -

            echo '${{ steps.render.outputs.manifest }}' | base64 -d | kubectl apply -f -

            kubectl rollout status deployment/todo-app \
              -n ${{ env.ENVIRONMENT }} --timeout=3m
