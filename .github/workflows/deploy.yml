# .github/workflows/deploy.yml
name: Build & Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/maxstaricov/devops_lab
  CHART_PATH: charts/todo-app
  APP_NAME: todo-app

# 🔒 Защита от параллельных запусков в одном окружении
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Вход в GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 🏗️ Сборка и пуш образа
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 📦 Копирование чарта на сервер
      - name: Copy Helm chart to k3s server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          source: ${{ env.CHART_PATH }}
          target: /opt/helm-charts
          strip_components: 1

      # 🚀 Деплой через Helm (правильный подход!)
      - name: Deploy with Helm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            set -euo pipefail
            
            ENV="${{ github.event.inputs.environment || 'dev' }}"
            KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
            CHART="/opt/helm-charts/todo-app"
            IMAGE_TAG="${{ github.sha }}"
            
            # Создаём/обновляем secret для pull из GHCR
            kubectl create secret docker-registry ghcr-secret \
              --namespace "$ENV" \
              --docker-server=${{ env.REGISTRY }} \
              --docker-username=${{ secrets.GHCR_USER }} \
              --docker-password=${{ secrets.GHCR_TOKEN }} \
              --dry-run=client -o yaml | kubectl apply --kubeconfig="$KUBECONFIG" -f -
            
            # 🔥 Helm-деплой с автоматическим созданием namespace и метками
            helm upgrade --install ${{ env.APP_NAME }} "$CHART" \
              --namespace "$ENV" \
              --kubeconfig "$KUBECONFIG" \
              -f "$CHART/values.yaml" \
              -f "$CHART/values-$ENV.yaml" \
              --set image.tag="$IMAGE_TAG" \
              --set image.pullSecrets[0].name=ghcr-secret \
              --create-namespace \
              --wait --timeout 5m \
              --atomic
            
            # Финальная проверка
            kubectl rollout status deployment/${{ env.APP_NAME }} \
              --namespace "$ENV" --kubeconfig "$KUBECONFIG" --timeout=3m
            
            echo "✅ Deployed ${{ env.APP_NAME }}@$IMAGE_TAG to $ENV"

      # 🧹 Очистка старых образов (опционально, для экономии места)
      - name: Cleanup old images on server
        uses: appleboy/ssh-action@v1
        if: always()
        with:
          host: ${{ secrets.K3S_HOST }}
          username: ${{ secrets.K3S_USER }}
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            # Оставляем последние 3 образа, удаляем остальные
            crictl rmi --prune || true