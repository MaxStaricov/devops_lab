replicaCount: 1

image:
  repository: ghcr.io/maxstaricov/devops_lab
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: "0.5"
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  path: /api/health
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  path: /api/health
  initialDelaySeconds: 3
  periodSeconds: 10

terminationGracePeriodSeconds: 60

preStopSleepSeconds: 10
